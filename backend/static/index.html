<!DOCTYPE html>
<html>
<head>
    <title>Drilling Hydraulics Simulator</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>

<body>

<h1>Drilling Hydraulics Simulator</h1>

<!-- TABS -->
<button onclick="showTab('run')">Run</button>
<button onclick="showTab('advanced')">Advanced</button>

<hr>

<!-- RUN TAB -->
<div id="run" class="tab">
    <h3>Quick Run</h3>

    Flowrate: <input id="flowrate" value="400"><br><br>
    Depth: <input id="depth" value="10000"><br><br>

    <button onclick="runSimulation()">Run Simulation</button>
</div>

<!-- ADVANCED TAB -->
<div id="advanced" class="tab" style="display:none">

<h3>Advanced Inputs</h3>

Trajectory:
<br>
<textarea id="trajectory" rows="5" cols="60">
[
  {"md":0,"inc":0,"azi":0,"tvd":0},
  {"md":10000,"inc":0,"azi":0,"tvd":10000}
]
</textarea>

<br><br>

Well Sections:
<br>
<textarea id="well" rows="5" cols="60">
[
  {"end_md":5000,"hole_d":12.25,"pipe_od":5},
  {"end_md":10000,"hole_d":8.5,"pipe_od":5}
]
</textarea>

<br><br>

BHA:
<br>
<textarea id="bha" rows="5" cols="60">
[
  {"name":"Drill Pipe","od":5,"id":4,"length":10000}
]
</textarea>

<br><br>

Fluid MW: <input id="mw" value="10"><br><br>

Fann 600: <input id="f600" value="60"><br>
Fann 300: <input id="f300" value="40"><br>
Fann 200: <input id="f200" value="30"><br>
Fann 100: <input id="f100" value="20"><br>
Fann 6: <input id="f6" value="10"><br>
Fann 3: <input id="f3" value="5"><br>

</div>

<hr>

<h2>Results</h2>
<pre id="result">Waiting...</pre>

<canvas id="chart" width="600" height="400"></canvas>

<script>

function showTab(tab) {
    document.querySelectorAll('.tab').forEach(t => t.style.display = 'none');
    document.getElementById(tab).style.display = 'block';
}

async function runSimulation() {

    document.getElementById("result").innerText = "Running...";

    const payload = {
        flowrate: Number(document.getElementById("flowrate").value),
        depth: Number(document.getElementById("depth").value),
        mpd_mode: "SBP",
        gradient_mode: "static",

        trajectory: JSON.parse(document.getElementById("trajectory").value),
        well_sections: JSON.parse(document.getElementById("well").value),
        bha: JSON.parse(document.getElementById("bha").value),

        fluid: {
            mw: Number(document.getElementById("mw").value),
            fann_600: Number(document.getElementById("f600").value),
            fann_300: Number(document.getElementById("f300").value),
            fann_200: Number(document.getElementById("f200").value),
            fann_100: Number(document.getElementById("f100").value),
            fann_6: Number(document.getElementById("f6").value),
            fann_3: Number(document.getElementById("f3").value)
        },

        temperature: {
            surface_temp: 80,
            bhct: 150,
            geothermal_grad: 1.5
        },

        cuttings: {
            rop: 50,
            concentration: 0.05,
            size: 0.2,
            density: 2.65,
            rpm: 120
        }
    };

    try {
        const res = await fetch("/simulate", {
            method: "POST",
            headers: {"Content-Type": "application/json"},
            body: JSON.stringify(payload)
        });

        if (!res.ok) {
            const text = await res.text();
            document.getElementById("result").innerText =
                "STATUS: " + res.status + "\n" + text;
            return;
        }

        const data = await res.json();

        console.log("API Response:", data);

        // SHOW RESULTS
        document.getElementById("result").innerText =
            "ECD Bottom: " + data.summary.ecd_bottom + "\n" +
            "ESD Bottom: " + data.summary.esd_bottom;

        // AUTO PLOT
        plotChart(data.profile.depth, data.profile.ecd, data.profile.esd);

    } catch (err) {
        document.getElementById("result").innerText = "ERROR: " + err;
    }
}

function plotChart(depth, ecd, esd) {

    const canvas = document.getElementById('chart');
    const ctx = canvas.getContext('2d');

    // SAFE DESTROY
    if (window.chart && typeof window.chart.destroy === "function") {
        window.chart.destroy();
    }

    window.chart = new Chart(ctx, {
        type: 'line',
        data: {
            labels: depth,
            datasets: [
                {
                    label: 'ECD',
                    data: ecd,
                    borderWidth: 2
                },
                {
                    label: 'ESD',
                    data: esd,
                    borderWidth: 2
                }
            ]
        },
        options: {
            responsive: true,
            scales: {
                x: {
                    title: { display: true, text: "Depth" }
                },
                y: {
                    title: { display: true, text: "ppg" }
                }
            }
        }
    });
}

</script>

</body>
</html>
