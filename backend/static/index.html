<!DOCTYPE html>
<html>
<head>
    <title>Drilling Hydraulics Simulator</title>
</head>

<body>

<h1>Drilling Hydraulics Simulator</h1>

<label>Flowrate:</label>
<input id="flowrate" value="400"><br><br>

<label>Depth:</label>
<input id="depth" value="10000"><br><br>

<button onclick="runSimulation()">Run Simulation</button>

<h2>Result:</h2>
<pre id="result">Waiting...</pre>

<script>
async function runSimulation() {

    document.getElementById("result").innerText = "Running...";

    const payload = {
        flowrate: 400,
        depth: 10000,
        mpd_mode: "SBP",
        gradient_mode: "static",
        hole_diameter: 8.5,

        bha: [
            {
                name: "Drill Pipe",
                od: 5,
                id: 4,
                length: 1000
            }
        ],

        fluid: {
            mw: 10,
            fann_600: 60,
            fann_300: 40,
            fann_200: 30,
            fann_100: 20,
            fann_6: 10,
            fann_3: 5
        },

        temperature: {
            surface_temp: 80,
            bhct: 150,
            geothermal_grad: 1.5
        },

        trajectory: [
            { md: 0, inc: 0, azi: 0, tvd: 0 },
            { md: 10000, inc: 0, azi: 0, tvd: 10000 }
        ],

        cuttings: {
            rop: 50,
            concentration: 0.05,
            size: 0.2,
            density: 2.65,
            rpm: 120
        }
    };

    try {
        const response = await fetch("/simulate", {
            method: "POST",   // ✅ THIS FIXES YOUR ERROR
            headers: {
                "Content-Type": "application/json"
            },
            body: JSON.stringify(payload)
        });

        const text = await response.text();

        document.getElementById("result").innerText =
            "STATUS: " + response.status + "\n\n" + text;

    } catch (err) {
        document.getElementById("result").innerText =
            "ERROR:\n" + err;
    }
}
</script>

</body>
</html>
