<!DOCTYPE html>
<html>
<head>
    <title>Drilling Hydraulics Simulator</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

    <style>
        .tab { display: none; }
        .active { display: block; }
    </style>
</head>

<body>

<h1>Drilling Hydraulics Simulator</h1>

<!-- TABS -->
<button onclick="showTab('simulation')">Simulation</button>
<button onclick="showTab('well')">Well Design</button>
<button onclick="showTab('bha')">BHA</button>
<button onclick="showTab('mud')">Mud</button>
<button onclick="showTab('temp')">Temperature</button>

<!-- ================= SIMULATION ================= -->
<div id="simulation" class="tab active">

Flowrate: <input id="flowrate" value="400"><br><br>
Depth: <input id="depth" value="10000"><br><br>

<button onclick="runSimulation()">Run Simulation</button>

<pre id="result">Waiting...</pre>
<canvas id="chart"></canvas>

</div>

<!-- ================= WELL DESIGN ================= -->
<div id="well" class="tab">

<h3>Well Design (Top → Bottom)</h3>

<table id="wellTable" border="1">
<tr>
<th>Type</th><th>Top MD</th><th>End MD</th><th>Casing ID</th><th>Hole Size</th>
</tr>

<tr>
<td>
<select>
<option>casing</option>
<option>liner</option>
<option selected>open hole</option>
</select>
</td>
<td><input value="0"></td>
<td><input value="10000"></td>
<td><input value="0"></td>
<td><input value="8.5"></td>
</tr>

</table>

</div>

<!-- ================= BHA ================= -->
<div id="bha" class="tab">

<h3>BHA (Top → Bottom)</h3>

<table id="bhaTable" border="1">
<tr><th>Name</th><th>OD</th><th>ID</th><th>Length</th></tr>

<tr>
<td>Drill Pipe</td>
<td><input value="5"></td>
<td><input value="4"></td>
<td><input value="8000"></td>
</tr>

<tr>
<td>Drill Collar</td>
<td><input value="6.5"></td>
<td><input value="2.5"></td>
<td><input value="2000"></td>
</tr>

</table>

</div>

<!-- ================= MUD ================= -->
<div id="mud" class="tab">

MW: <input id="mw" value="10"><br><br>

600 <input id="f600" value="60">
300 <input id="f300" value="40">
200 <input id="f200" value="30">
100 <input id="f100" value="20">
6 <input id="f6" value="10">
3 <input id="f3" value="5">

</div>

<!-- ================= TEMP ================= -->
<div id="temp" class="tab">

Surface Temp: <input id="surface_temp" value="80"><br><br>
BHCT: <input id="bhct" value="150"><br><br>

</div>

<script>

let chartInstance = null;

function showTab(tab) {
    document.querySelectorAll(".tab").forEach(t => t.classList.remove("active"));
    document.getElementById(tab).classList.add("active");
}

// ================= BUILD PAYLOAD =================
function buildPayload() {

    let well_sections = [];
    let rows = document.getElementById("wellTable").rows;

    for (let i = 1; i < rows.length; i++) {
        let c = rows[i].cells;

        well_sections.push({
            type: c[0].children[0].value,
            top_md: Number(c[1].children[0].value),
            end_md: Number(c[2].children[0].value),
            casing_id: Number(c[3].children[0].value),
            hole_d: Number(c[4].children[0].value)
        });
    }

    let bha = [];
    let bhaRows = document.getElementById("bhaTable").rows;

    for (let i = 1; i < bhaRows.length; i++) {
        let c = bhaRows[i].cells;

        bha.push({
            name: c[0].innerText,
            od: Number(c[1].children[0].value),
            id: Number(c[2].children[0].value),
            length: Number(c[3].children[0].value)
        });
    }

    return {
        flowrate: Number(document.getElementById("flowrate").value),
        depth: Number(document.getElementById("depth").value),

        // REQUIRED FIELDS
        mpd_mode: "SBP",
        gradient_mode: "static",

        fluid: {
            mw: Number(document.getElementById("mw").value),
            fann_600: Number(document.getElementById("f600").value),
            fann_300: Number(document.getElementById("f300").value),
            fann_200: Number(document.getElementById("f200").value),
            fann_100: Number(document.getElementById("f100").value),
            fann_6: Number(document.getElementById("f6").value),
            fann_3: Number(document.getElementById("f3").value)
        },

        temperature: {
            surface_temp: Number(document.getElementById("surface_temp").value),
            bhct: Number(document.getElementById("bhct").value),
            geothermal_grad: 1.5
        },

        trajectory: [
            {md: 0, inc: 0, azi: 0, tvd: 0},
            {md: Number(document.getElementById("depth").value), inc: 0, azi: 0, tvd: Number(document.getElementById("depth").value)}
        ],

        well_sections: well_sections,
        bha: bha,

        // REQUIRED
        cuttings: {
            rop: 50,
            concentration: 0.05,
            size: 0.2,
            density: 2.65,
            rpm: 120
        }
    };
}

// ================= RUN =================
async function runSimulation() {

    document.getElementById("result").innerText = "Running...";

    const payload = buildPayload();

    try {

        const response = await fetch("/simulate", {
            method: "POST",
            headers: {"Content-Type": "application/json"},
            body: JSON.stringify(payload)
        });

        const text = await response.text();  // 🔥 get raw text first

        let result;

        try {
            result = JSON.parse(text);  // try parse
        } catch (e) {
            document.getElementById("result").innerText =
                "❌ Backend Error (Not JSON):\n\n" + text;
            return;
        }

        if (!response.ok) {
            document.getElementById("result").innerText =
                "❌ ERROR " + response.status + ":\n" +
                JSON.stringify(result, null, 2);
            return;
        }

        document.getElementById("result").innerText =
            "ECD Bottom: " + result.summary.ecd_bottom + "\n" +
            "ESD Bottom: " + result.summary.esd_bottom;

        plotChart(result.profile);

    } catch (err) {
        document.getElementById("result").innerText =
            "❌ NETWORK ERROR:\n" + err.message;
    }
}

// ================= CHART =================
function plotChart(profile) {

    const ctx = document.getElementById("chart");

    if (chartInstance && typeof chartInstance.destroy === "function") {
        chartInstance.destroy();
    }

    // 🔥 Convert to (x,y) pairs
    const ecdData = profile.depth.map((d, i) => ({
        x: profile.ecd[i],
        y: d
    }));

    const esdData = profile.depth.map((d, i) => ({
        x: profile.esd[i],
        y: d
    }));

    chartInstance = new Chart(ctx, {
        type: "scatter",
        data: {
            datasets: [
                {
                    label: "ECD (ppg)",
                    data: ecdData,
                    showLine: true
                },
                {
                    label: "ESD (ppg)",
                    data: esdData,
                    showLine: true
                }
            ]
        },
        options: {
            responsive: true,
            scales: {

                // 🔥 X AXIS = DENSITY
                x: {
                    title: {
                        display: true,
                        text: "Density (ppg)"
                    }
                },

                // 🔥 Y AXIS = DEPTH (REVERSED)
                y: {
                    reverse: true,
                    title: {
                        display: true,
                        text: "Depth (ft)"
                    }
                }
            }
        }
    });
}

</script>

</body>
</html>
