<!DOCTYPE html>
<html>
<head>
    <title>Drilling Hydraulics Simulator</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>

<body>

<h1>Drilling Hydraulics Simulator</h1>

<h3>Quick Run</h3>

Flowrate: <input id="flowrate" value="400"><br><br>
Depth: <input id="depth" value="10000"><br><br>

<button onclick="runSimulation()">Run Simulation</button>

<h3>Results</h3>
<pre id="result">Waiting...</pre>

<canvas id="chart" width="600" height="400"></canvas>

<script>

let chartInstance = null;

async function runSimulation() {

    document.getElementById("result").innerText = "Running...";

    const payload = {
        flowrate: Number(document.getElementById("flowrate").value),
        depth: Number(document.getElementById("depth").value),

        fluid: {
            mw: 10,
            fann_600: 60,
            fann_300: 40,
            fann_200: 30,
            fann_100: 20,
            fann_6: 10,
            fann_3: 5
        },

        temperature: {
            surface_temp: 80,
            bhct: 150,
            geothermal_grad: 1.5
        },

        trajectory: [
            {md: 0, inc: 0, azi: 0, tvd: 0},
            {md: 10000, inc: 0, azi: 0, tvd: 10000}
        ],

        well_sections: [
            {
                type: "casing",
                top_md: 0,
                end_md: 5000,
                casing_id: 9.625,
                hole_d: 12.25
            },
            {
                type: "open hole",
                top_md: 5000,
                end_md: 10000,
                casing_id: 0,
                hole_d: 8.5
            }
        ],

        bha: [
            {name: "Drill Pipe", od: 5, id: 4, length: 8000},
            {name: "Drill Collar", od: 6.5, id: 2.5, length: 2000}
        ]
    };

    try {

        const response = await fetch("/simulate", {
            method: "POST",
            headers: {
                "Content-Type": "application/json"
            },
            body: JSON.stringify(payload)
        });

        const result = await response.json();

        // 🔥 HANDLE BACKEND ERROR
        if (!response.ok) {
            document.getElementById("result").innerText =
                "ERROR " + response.status + ":\n" + JSON.stringify(result, null, 2);
            return;
        }

        // ✅ SAFE ACCESS
        document.getElementById("result").innerText =
            "ECD Bottom: " + result.summary.ecd_bottom + "\n" +
            "ESD Bottom: " + result.summary.esd_bottom + "\n" +
            "Pressure Loss: " + result.summary.total_pressure_loss;

        plotChart(result.profile);

    } catch (error) {
        document.getElementById("result").innerText =
            "ERROR: " + error.message;
    }
}

function plotChart(profile) {

    const ctx = document.getElementById("chart").getContext("2d");

    // 🔥 SAFE DESTROY
    if (chartInstance && typeof chartInstance.destroy === "function") {
        chartInstance.destroy();
    }

    chartInstance = new Chart(ctx, {
        type: "line",
        data: {
            labels: profile.depth,
            datasets: [
                {
                    label: "ECD",
                    data: profile.ecd
                },
                {
                    label: "ESD",
                    data: profile.esd
                }
            ]
        },
        options: {
            scales: {
                y: {
                    reverse: true,
                    title: {
                        display: true,
                        text: "Depth"
                    }
                },
                x: {
                    title: {
                        display: true,
                        text: "ECD / ESD"
                    }
                }
            }
        }
    });
}

</script>

</body>
</html>
