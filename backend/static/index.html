<!DOCTYPE html>
<html>
<head>
    <title>Drilling Hydraulics Simulator</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>

<body>

<h1>Drilling Hydraulics Simulator</h1>

<!-- TABS -->
<button onclick="showTab('run')">Run</button>
<button onclick="showTab('mud')">Mud</button>
<button onclick="showTab('well')">Well Design</button>
<button onclick="showTab('bha')">BHA</button>

<hr>

<!-- RUN -->
<div id="run" class="tab">
    Flowrate: <input id="flowrate" value="400"><br><br>
    Depth: <input id="depth" value="10000"><br><br>
    <button onclick="runSimulation()">Run Simulation</button>
</div>

<!-- MUD -->
<div id="mud" class="tab" style="display:none">
    <h3>Mud Properties</h3>

    MW: <input id="mw" value="10"><br><br>

    600: <input id="f600" value="60"><br>
    300: <input id="f300" value="40"><br>
    200: <input id="f200" value="30"><br>
    100: <input id="f100" value="20"><br>
    6: <input id="f6" value="10"><br>
    3: <input id="f3" value="5"><br>
</div>

<!-- WELL DESIGN TABLE -->
<div id="well" class="tab" style="display:none">

<h3>Well Design</h3>

<table border="1" id="wellTable">
<tr>
<th>Type</th>
<th>Top MD</th>
<th>Bottom MD</th>
<th>Hole Size (in)</th>
<th>Pipe OD (in)</th>
</tr>

<tr>
<td>Open Hole</td>
<td>0</td>
<td>10000</td>
<td>8.5</td>
<td>5</td>
</tr>

</table>

<br>
<button onclick="addWellRow()">Add Row</button>

</div>

<!-- BHA TABLE -->
<div id="bha" class="tab" style="display:none">

<h3>BHA</h3>

<table border="1" id="bhaTable">
<tr>
<th>Name</th>
<th>OD</th>
<th>ID</th>
<th>Length</th>
</tr>

<tr>
<td>Drill Pipe</td>
<td>5</td>
<td>4</td>
<td>10000</td>
</tr>

</table>

<br>
<button onclick="addBHARow()">Add Row</button>

</div>

<hr>

<h2>Results</h2>
<pre id="result">Waiting...</pre>

<canvas id="chart"></canvas>

<script>

function showTab(tab) {
    document.querySelectorAll('.tab').forEach(t => t.style.display = 'none');
    document.getElementById(tab).style.display = 'block';
}

// -----------------------------
// ADD ROW FUNCTIONS
// -----------------------------
function addWellRow() {
    let table = document.getElementById("wellTable");
    let row = table.insertRow();

    for (let i = 0; i < 5; i++) {
        row.insertCell().contentEditable = true;
    }
}

function addBHARow() {
    let table = document.getElementById("bhaTable");
    let row = table.insertRow();

    for (let i = 0; i < 4; i++) {
        row.insertCell().contentEditable = true;
    }
}

// -----------------------------
// EXTRACT TABLE DATA
// -----------------------------
function getWellData() {
    let table = document.getElementById("wellTable");
    let data = [];

    for (let i = 1; i < table.rows.length; i++) {
        let row = table.rows[i];

        data.push({
            end_md: Number(row.cells[2].innerText),
            hole_d: Number(row.cells[3].innerText),
            pipe_od: Number(row.cells[4].innerText)
        });
    }

    return data;
}

function getBHAData() {
    let table = document.getElementById("bhaTable");
    let data = [];

    for (let i = 1; i < table.rows.length; i++) {
        let row = table.rows[i];

        data.push({
            name: row.cells[0].innerText,
            od: Number(row.cells[1].innerText),
            id: Number(row.cells[2].innerText),
            length: Number(row.cells[3].innerText)
        });
    }

    return data;
}

// -----------------------------
// RUN SIMULATION
// -----------------------------
async function runSimulation() {

    document.getElementById("result").innerText = "Running...";

    const payload = {
        flowrate: Number(document.getElementById("flowrate").value),
        depth: Number(document.getElementById("depth").value),
        mpd_mode: "SBP",
        gradient_mode: "static",

        trajectory: [
            {md:0, inc:0, azi:0, tvd:0},
            {md:Number(document.getElementById("depth").value), inc:0, azi:0, tvd:Number(document.getElementById("depth").value)}
        ],

        well_sections: getWellData(),
        bha: getBHAData(),

        fluid: {
            mw: Number(document.getElementById("mw").value),
            fann_600: Number(document.getElementById("f600").value),
            fann_300: Number(document.getElementById("f300").value),
            fann_200: Number(document.getElementById("f200").value),
            fann_100: Number(document.getElementById("f100").value),
            fann_6: Number(document.getElementById("f6").value),
            fann_3: Number(document.getElementById("f3").value)
        },

        temperature: {
            surface_temp: 80,
            bhct: 150,
            geothermal_grad: 1.5
        },

        cuttings: {
            rop: 50,
            concentration: 0.05,
            size: 0.2,
            density: 2.65,
            rpm: 120
        }
    };

    try {
        const res = await fetch("/simulate", {
            method: "POST",
            headers: {"Content-Type": "application/json"},
            body: JSON.stringify(payload)
        });

        const data = await res.json();

        document.getElementById("result").innerText =
            "ECD Bottom: " + data.summary.ecd_bottom + "\n" +
            "ESD Bottom: " + data.summary.esd_bottom;

        plotChart(data.profile.depth, data.profile.ecd, data.profile.esd);

    } catch (err) {
        document.getElementById("result").innerText = "ERROR: " + err;
    }
}

// -----------------------------
// PLOT
// -----------------------------
function plotChart(depth, ecd, esd) {

    const ctx = document.getElementById('chart').getContext('2d');

    if (window.chart && typeof window.chart.destroy === "function") {
        window.chart.destroy();
    }

    const ecdData = depth.map((d, i) => ({ x: ecd[i], y: d }));
    const esdData = depth.map((d, i) => ({ x: esd[i], y: d }));

    window.chart = new Chart(ctx, {
        type: 'scatter',
        data: {
            datasets: [
                { label: 'ECD', data: ecdData, showLine: true },
                { label: 'ESD', data: esdData, showLine: true }
            ]
        },
        options: {
            scales: {
                x: { title: { display: true, text: "Density (ppg)" }},
                y: { reverse: true, title: { display: true, text: "Depth" }}
            }
        }
    });
}

</script>

</body>
</html>
