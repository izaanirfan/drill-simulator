<!DOCTYPE html>
<html>
<head>
    <title>Drilling Hydraulics Simulator</title>
</head>

<body>
    <h1>Drilling Hydraulics Simulator</h1>

    <label>Flowrate:</label>
    <input type="number" id="flowrate" value="400"><br><br>

    <label>Depth:</label>
    <input type="number" id="depth" value="10000"><br><br>

    <button onclick="runSimulation()">Run Simulation</button>

    <h2>Result:</h2>
    <pre id="result"></pre>

    <script>
        async function runSimulation() {
            console.log("Button clicked");

            const flowrate = parseFloat(document.getElementById("flowrate").value);
            const depth = parseFloat(document.getElementById("depth").value);

            const payload = {
                flowrate: flowrate,
                depth: depth,

                mpd_mode: "SBP",
                gradient_mode: "static",

                hole_diameter: 8.5,

                bha: [
                    {
                        name: "Drill Pipe",
                        od: 5,
                        id: 4,
                        length: 1000
                    }
                ],

                fluid: {
                    mw: 10,
                    fann_600: 60,
                    fann_300: 40,
                    fann_200: 30,
                    fann_100: 20,
                    fann_6: 10,
                    fann_3: 5
                },

                temperature: {
                    bhct: 150,
                    geothermal_grad: 1.5
                },

                trajectory: [
                    {
                        md: 0,
                        inc: 0,
                        tvd: 0
                    },
                    {
                        md: depth,
                        inc: 0,
                        tvd: depth
                    }
                ],

                cuttings: {
                    rate_of_penetration: 50,
                    concentration: 0.05
                }
            };

            try {
                const response = await fetch("https://drill-simulator.onrender.com/simulate", {
                    method: "POST",
                    headers: {
                        "Content-Type": "application/json"
                    },
                    body: JSON.stringify(payload)
                });

                const data = await response.json();

                document.getElementById("result").textContent =
                    JSON.stringify(data, null, 2);

            } catch (error) {
                console.error("Error:", error);
                document.getElementById("result").textContent = "Error connecting to backend.";
            }
        }
    </script>
</body>
</html>
