<!DOCTYPE html>
<html>
<head>
    <title>Drilling Hydraulics Simulator</title>
</head>
<body>

<h1>Drilling Hydraulics Simulator</h1>

<label>Flowrate:</label>
<input id="flowrate" value="400"><br><br>

<label>Depth:</label>
<input id="depth" value="10000"><br><br>

<button onclick="runSimulation()">Run Simulation</button>

<h3>Result:</h3>
<pre id="result"></pre>

<script>
async function runSimulation() {
    console.log("Button clicked");

    const flowrate = parseFloat(document.getElementById("flowrate").value);
    const depth = parseFloat(document.getElementById("depth").value);

    const payload = {
        flowrate: flowrate,
        depth: depth,

        mpd_mode: "SBP",   // or "CBHP"

        hole_diameter: 8.5,

        bha: [
            {
                od: 5,
                id: 4,
                length: 1000
            }
        ],

        fluid: {
            mud_weight: 10,
            rheology: {
                model: "HB",
                pv: 20,
                yp: 10
            }
        },

        temperature: {
            surface_temp: 80,
            geothermal_gradient: 1.5
        }
    };

    try {
        const response = await fetch("https://drill-simulator.onrender.com/simulate", {
            method: "POST",
            headers: {
                "Content-Type": "application/json"
            },
            body: JSON.stringify(payload)
        });

        const data = await response.json();

        console.log("Response:", data);

        document.getElementById("result").innerText = JSON.stringify(data, null, 2);

    } catch (error) {
        console.error("Error:", error);
        document.getElementById("result").innerText = "Error: " + error;
    }
}
</script>

</body>
</html>
