<!DOCTYPE html>
<html>
<head>
  <title>Drilling Hydraulics Simulator</title>
</head>

<body style="font-family: Arial; padding: 20px;">

<h1>Drilling Hydraulics Simulator</h1>

<label>Flowrate:</label>
<input id="flowrate" type="number" value="400"><br><br>

<label>Depth:</label>
<input id="depth" type="number" value="10000"><br><br>

<button onclick="runSimulation()">Run Simulation</button>

<pre id="result"></pre>

<script>
async function runSimulation() {
    console.log("Button clicked");

    const flowrate = parseFloat(document.getElementById("flowrate").value);
    const depth = parseFloat(document.getElementById("depth").value);

    const payload = {
        flowrate: flowrate,
        depth: depth
    };

    try {
        const response = await fetch("https://drill-simulator.onrender.com/simulate", {
            method: "POST",
            headers: {
                "Content-Type": "application/json"
            },
            body: JSON.stringify(payload)
        });

        const data = await response.json();

        console.log("Response:", data);

        document.getElementById("result").innerText = JSON.stringify(data, null, 2);

    } catch (error) {
        console.error("Error:", error);
    }
}
</script>

</body>
</html>
