<!DOCTYPE html>
<html>
<head>
  <title>Drilling Simulator</title>
</head>
<body>

<h2>Drilling Hydraulics Simulator</h2>

<label>Flowrate (gpm):</label>
<input id="flowrate" value="400"><br><br>

<label>Depth (ft):</label>
<input id="depth" value="10000"><br><br>

<button onclick="runSimulation()">Run Simulation</button>

<h3>Result:</h3>
<pre id="output"></pre>

<script>
async function runSimulation() {

  const response = await fetch("https://drill-simulator.onrender.com/simulate", {
    method: "POST",
    headers: {"Content-Type": "application/json"},
    body: JSON.stringify({
      flowrate: parseFloat(document.getElementById("flowrate").value),
      depth: parseFloat(document.getElementById("depth").value),
      hole_diameter: 12.25,
      sbp: 0,
      mpd_mode: "SBP",

      fluid: {
        mw: 12,
        fann_600: 50,
        fann_300: 30,
        fann_200: 20,
        fann_100: 15,
        fann_6: 5,
        fann_3: 3
      },

      temperature: {
        surface_temp: 80,
        bhct: 250,
        geothermal_grad: 0.02
      },

      bha: [
        {name:"DP", od:5, id:4, length:1000}
      ],

      trajectory: [
        {md:0, inc:0, azi:0},
        {md:10000, inc:0, azi:0}
      ],

      gradient_mode: "SINGLE",

      cuttings: {
        rop: 50,
        size: 0.2,
        density: 20,
        rpm: 120
      }
    })
  });

  const data = await response.json();
  document.getElementById("output").textContent = JSON.stringify(data, null, 2);
}
</script>

</body>
</html>
